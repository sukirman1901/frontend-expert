description = "Run a design system audit — AI aesthetic, tokens, accessibility, performance"

prompt = """
Invoke the design-reviewer agent.

Load skills in order: anti-ai-slop → design-tokens (if available) → accessibility → web-performance. Use ui-components for pattern/state checks as needed.

Run a design system audit on the current codebase:

1. Scan for AI aesthetic anti-patterns (purple/indigo defaults, excessive gradients, rounded-2xl everywhere, generic heroes, Lorem ipsum, shadow-heavy cards)
2. Check token adherence when a token file is available
3. Review accessibility (WCAG 2.1 AA)
4. Note Core Web Vitals / loading risks relevant to UI
5. Validate responsive design at 320 / 768 / 1024 / 1440
6. Output the design-reviewer scorecard — mark unevaluated fields explicitly; do not fabricate visual scores without screenshots or tokens

Modes via arguments: full (default), --quick, --token <file>, --component <name>.
"""
