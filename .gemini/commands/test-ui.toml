description = "Test user-facing UI — component tests, states, a11y, critical paths"

prompt = """
Invoke the test-engineer agent.

Load skills in order: frontend-testing → ui-components → accessibility. Load anti-ai-slop only if verifying visual regressions tied to slop fixes. Load frontend-judgment only if test strategy for a large surface is unclear.

1. Publish a short test plan (unit / integration / E2E)
2. Prefer TDD for new behavior (red → green → refactor)
3. Cover loading / error / empty when those states exist
4. Prefer role/label queries over test IDs
5. Add a11y assertions when tooling exists
6. Run the project's test command when available
7. Report coverage checklist + remaining gaps

Modes via arguments: default, --component <name>, --tdd, --gaps.
"""
