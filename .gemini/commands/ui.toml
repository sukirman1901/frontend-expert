description = "Build production UI with curated tokens — avoid AI aesthetic"

prompt = """
Invoke the ui-developer agent.

Load skills in order: frontend-judgment (if non-trivial UI) → design-tokens → ui-components → anti-ai-slop → accessibility (light). Load motion only if animation is in scope.

For blank-canvas or ambiguous UI, offer 2–3 approaches with tradeoffs and one recommendation before coding (unless the user said to just implement).

Build UI that looks design-system-aware, not AI-generated:

1. Use CSS custom properties from tokens/ (or the project's existing design system) — never raw hex
2. Follow spacing scale (0.25rem increments) and token border-radius
3. Handle loading, error, and empty states
4. Make interactive elements keyboard accessible
5. Scan for AI aesthetic patterns before finishing
6. Report implementation, tokens used, a11y notes, and responsive behavior

Modes via arguments: token mode (default), --token <file>, --custom.
"""
